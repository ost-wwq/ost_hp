version: '3.8'
services:
  ost-hp-admin:
    container_name: ost-hp-admin
    image: webdevops/php-nginx:8.4-alpine
    volumes:
      - ../:/app
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../../ost_hp/ost-hp/public/uploads:/app/public/uploads
    ports:
      - '8014:80'
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
      - TZ=Asia/Tokyo
      - PHP_UPLOAD_MAX_FILESIZE=20M
      - PHP_POST_MAX_SIZE=20M
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - project-network

networks:
  project-network:
    driver: bridge
